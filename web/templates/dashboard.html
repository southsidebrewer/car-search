<!DOCTYPE html>
<html>
<head>
    <title>Car Search Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f8;
        }

        header {
            background: #111;
            color: white;
            padding: 15px 25px;
        }

        /* 3-column header: left title, center tabs, right logout */
        .header-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
        }

        .brand {
            font-size: 22px;
            font-weight: bold;
            margin: 0;
            justify-self: start;
        }

        nav.main-nav {
            justify-self: center;
            display: flex;
            gap: 40px;
        }

        .logout-wrap {
            justify-self: end;
        }

        /* TEXT-ONLY nav styling (no backgrounds, no "button" look) */
        nav.main-nav a,
        .logout-wrap a {
            color: #bbb;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s ease;
        }

        nav.main-nav a:hover,
        .logout-wrap a:hover {
            color: #2c7be5;
        }

        nav.main-nav a.active {
            color: #2c7be5;
        }

        .container {
            padding: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        .card h2 {
            margin-top: 0;
        }
    </style>
</head>
<body>

<header>
    <div class="header-row">
        <h1 class="brand">Car Search Dashboard</h1>

        <nav class="main-nav">
            <a href="/" class="active">Dashboard</a>
            <a href="/crx">CRX Search</a>
            <a href="/suv">SUV Search</a>
        </nav>

        <div class="logout-wrap">
            <a href="/logout">Logout</a>
        </div>
    </div>
</header>

<div class="container">
    <div class="card">
        <h2>CRX Search Overview</h2>
        <p>CRX results summary will appear here.</p>
    </div>

    <div class="card">
        <h2>SUV Search Overview</h2>
        <p>SUV results summary will appear here.</p>
    </div>
</div>

</body>
</html>
